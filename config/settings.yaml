parsing:
  chunk_size: 10
  chunk_overlap: 5

llm:
  abbr:
    role_prompt: >
      Ты - копирующий парсер аббревиатур.
    instructions: >
      Найди все аббревиатуры и сокращения в тексте ниже.
      Включай в список только то, что явно есть в тексте.
      Аббревиатура: последовательность заглавных букв/цифр/слэшей, используемая как термин. Примеры: НИИ, ЖКХ, ГОСТ, PDF, USB.

      НЕ включай:
      - обычные слова с заглавной буквы (начало предложения, имена, названия);
      - слова в кавычках («Методика», «Глоссарий»);
      - конструкции «(далее — ...)».

      Если аббревиатур нет — верни [].

      Ответ: только массив строк, без пояснений.
      Пример: ["НИИ", "ГОСТ", "PDF"]

      Текст:

  term:
    role_prompt: >
      Ты — старший лингвист-аналитик с экспертизой в технической документации на русском языке. Твоя задача — точно извлечь все термины и понятия, которым в тексте даётся определение или перевод, строго опираясь на его содержимое.
    instructions: >
      Найди все термины и понятия в тексте ниже, которым явно дано определение, перевод или пояснение.

      Включай в список только то, что явно есть в тексте.
      Термин: слово или словосочетание, после которого в скобках, через тире или двоеточие дано его определение, перевод или расшифровка на другом языке.

      Примеры шаблонов:
      - "Термин (перевод)" → Церковь Назарянина (Church of the Nazarene)
      - "Термин — определение" → Рейкьявик — столица, крупнейший город и культурный центр Исландии
      - "Термин: определение" → Регулятор: орган государственной власти

      НЕ включай:
      - аббревиатуры и сокращения (ИБ, ИТ, ГОСТ);
      - конструкции «(далее — ...)» — это псевдоним, а не определение термина;
      - обычные предложения без явного шаблона «термин — определение».

      Если терминов с определениями нет — верни [].

      Ответ: только массив строк, без пояснений.
      Пример: ["Церковь Назарянина", "Рейкьявик", "Регулятор"]

      Текст:

  def_abbr:
    role_prompt: >
      Ты — бездушный JSON-парсер. У тебя нет памяти и знаний. Ты можешь только копировать текст.
    instructions: >
      Твоя задача: проверить, есть ли в тексте ДОСЛОВНАЯ расшифровка аббревиатуры.

      ШАГ 1. Проверь наличие одного из шаблонов:
      - "Расшифровка (АББР)"
      - "АББР — Расшифровка"

      ШАГ 2. Верни СТРОГО один JSON-объект. Никаких рассуждений! Никакого текста до или после JSON!

      Правила заполнения JSON:
      - Поле "has_definition": true (если есть явная расшифровка) или false (если расшифровки нет).
      - Поле "expansion": скопированная расшифровка (если true) ИЛИ строго null (если false).

      ПРИМЕР 1 (В тексте: "...зелёный юстировочный блок-редуктор (ЗЮБР)..."):
      Термин: ЗЮБР
      Ответ: {{"has_definition": true, "expansion": "зелёный юстировочный блок-редуктор"}}

      ПРИМЕР 2 (В тексте: "...модуль МРТ-7 был интегрирован..."):
      Термин: МРТ-7
      Ответ: {{"has_definition": false, "expansion": null}}

      ТВОЯ ЗАДАЧА:
      Термин: "{ABBR}"
      Текст: {TEXT}
      Ответ:
  

  def_term:
    role_prompt: >
      Ты — бездушный JSON-парсер. У тебя нет памяти и знаний. Ты можешь только копировать текст.
    instructions: >
      Твоя задача: проверить, есть ли в тексте ДОСЛОВНОЕ определение термина.
      
      ГЛАВНОЕ ПРАВИЛО: Определение должно быть фрагментом текста. 
      Если в тексте нет явного определения (термин просто упоминается), обязательно верни false. ЗАПРЕЩЕНО писать отсебятину или рассуждения.
      
      Верни СТРОГО один JSON-объект.
      - "has_definition": true (если определение есть) или false (если его нет).
      - "expansion": только само определение (если true), ИЛИ строго null (если false).
      
      ПРИМЕР 1 (В тексте: "...Глоб-фактор — коэффициент спонтанного искривления..."):
      Термин: Глоб-фактор
      Ответ: {{"has_definition": true, "expansion": "коэффициент спонтанного искривления"}}
      
      ПРИМЕР 2 (В тексте: "...инженеры заменили синхрофазотрон..."):
      Термин: Синхрофазотрон
      Ответ: {{"has_definition": false, "expansion": null}}
      
      ТВОЯ ЗАДАЧА:
      Термин: "{TERM}"
      Текст: {TEXT}
      Ответ:

  resolve_abbr:
    role_prompt: >
      Ты — бездушный автоматический редактор технического глоссария. У тебя нет мнения, ты работаешь только как парсер.
    instructions: >
      Твоя задача — проанализировать несколько вариантов РАСШИФРОВКИ для одной аббревиатуры и вернуть СТРОГО одну каноничную форму.

      ГЛАВНЫЕ ПРАВИЛА:
      1. Верни ТОЛЬКО расшифровку. Никаких смысловых определений или описаний.
         ПРАВИЛЬНО: "программное обеспечение"
         НЕПРАВИЛЬНО: "программное обеспечение — это класс программ для решения задач"
      2. Если варианты похожи, выбери базовый, грамматически верный вариант (обычно в именительном падеже).
      3. Исключи из ответа саму аббревиатуру и любые тире (не пиши "ПО - программное обеспечение").
      4. ЗАПРЕЩЕНО писать отсебятину, рассуждения или "Ответ:".

      ВХОДНЫЕ ДАННЫЕ:
      Аббревиатура: "{ENTITY}"
      Найденные варианты расшифровок: {VARIANTS}

      ФОРМАТ ОТВЕТА (строго JSON):
      {{"resolved_definition": "Итоговая расшифровка"}}

  resolve_term:
    role_prompt: >
      Ты — главный редактор технической документации. Твоя задача — составить эталонный глоссарий.
    instructions: >
      На вход подается термин и несколько вариантов его СМЫСЛОВОГО ОПРЕДЕЛЕНИЯ, найденных в тексте.
      Твоя задача — сформулировать одно полное, грамотное и каноничное определение.

      ГЛАВНЫЕ ПРАВИЛА:
      1. Если одно определение более полное, а второе обрывочное — выбери полное.
      2. Если определения дополняют друг друга, аккуратно объедини их смысл в одно читаемое предложение.
      3. Определение должно звучать словарно (например: "Комплекс программ, обеспечивающих...").
      4. ВАЖНО! Исключи из ответа сам термин и тире (не пиши "Термин — это..."). Только само определение.
      5. ЗАПРЕЩЕНО писать отсебятину, рассуждения или "Ответ:".

      ВХОДНЫЕ ДАННЫЕ:
      Термин: "{ENTITY}"
      Найденные варианты определений: {VARIANTS}

      ФОРМАТ ОТВЕТА (строго JSON):
      {{"resolved_definition": "Итоговое смысловое определение"}}

