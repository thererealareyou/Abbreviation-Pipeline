services:
  db:
    image: postgres:15-alpine
    container_name: nlp_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      
  api:
    build: .
    container_name: fastapi_app
    restart: always
    command: >
      sh -c "alembic upgrade head || alembic stamp head && uvicorn app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - LLM_API_URL=${LLM_API_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
  
  worker:
    build: .
    container_name: celery_worker
    restart: always
    command: celery -A src.backend.tasks.public worker -l info --pool=threads --concurrency=8
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST}:${RABBITMQ_PORT}//
      - LLM_API_URL=http://${LLM_API_HOST}:${LLM_API_PORT}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
      - rabbitmq
      - db
      

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nlp_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data: